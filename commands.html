<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneInfo Commands</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: monospace; padding: 20px; }
        .terminal { background: #000; border: 1px solid #30363d; padding: 20px; border-radius: 8px; color: #58a6ff; line-height: 1.5; word-break: break-all; }
        .copy-btn { background: #2f81f7; color: white; border: none; padding: 12px 25px; border-radius: 6px; margin-top: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h2 style="color:white;">Installation Commands</h2>
    <div class="terminal" id="cmd">
        pkg update && pkg upgrade -y && pkg install git -y && git clone https://github.com/kinh17631-star/MyToolHub && cd MyToolHub/phoneinfo && bash phoneinfo.sh
    </div>
    <button class="copy-btn" onclick="copy()">Copy All Commands</button>

    <script>
        function copy() {
            let t = document.getElementById('cmd').innerText;
            navigator.clipboard.writeText(t);
            alert("Commands Copied! Now paste in Terminal.");
        }
    </script>
</body>
</html>
