<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting... | Please Wait</title>
    <style>
        body { background: #0a0b10; color: white; text-align: center; font-family: sans-serif; padding-top: 100px; }
        .ad-box { width: 300px; height: 250px; background: #222; margin: 20px auto; border: 1px dashed #555; display: flex; align-items: center; justify-content: center; }
        #timer { font-size: 3rem; color: #3b82f6; font-weight: bold; }
        .hidden { display: none; }
        .btn { background: #10b981; color: white; border: none; padding: 15px 30px; border-radius: 5px; font-size: 1.2rem; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>
    <h2>Please Wait for Your Link...</h2>
    <div class="ad-box">AD SPACE (Promotion)</div>
    <div id="timer">10</div>
    <p>Step 1/2: Generating secure link...</p>
    
    <div id="final-btn" class="hidden">
        <p>Link Ready!</p>
        <a href="commands.html" class="btn">Continue to Commands</a>
    </div>

    <script>
        let count = 10;
        let timer = setInterval(function() {
            count--;
            document.getElementById("timer").innerText = count;
            if (count <= 0) {
                clearInterval(timer);
                document.getElementById("timer").classList.add("hidden");
                document.getElementById("final-btn").classList.remove("hidden");
            }
        }, 1000);
    </script>
</body>
</html>
